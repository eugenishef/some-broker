spring:
  application:
    name: broker-reporting

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${POSTGRES_DB:broker_dev}
    username: ${POSTGRES_USER:broker}
    password: ${POSTGRES_PASSWORD:broker}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

  liquibase:
    enabled: true
    change-log: classpath:db/changelog/db.changelog-master.xml

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      group-id: broker-reporting
      auto-offset-reset: earliest
      properties:
        spring.json.trusted.packages: "dev.eshevchenko"
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer

server:
  port: 8082

app:
  reporting:
    kafka:
      topics:
        report-requests: report-requests
        reconciliation-requests: reconciliation-requests
    executor:
      report:
        core-size: 4
        max-size: 8
        queue-capacity: 50
      reconciliation:
        core-size: 2
        max-size: 4
        queue-capacity: 30

logging:
  level:
    root: INFO
    com.example.minibank.reporting: INFO
    org.springframework.kafka: WARN
    org.apache.kafka: WARN