input {
  # Основной input от Spring Boot (JSON over TCP)
  tcp {
    port => 5001
    type => "json"
    codec => json
  }

  # Input от Filebeat (если будешь использовать)
  beats {
    port => 5044
  }
}

filter {
  # Если вдруг пришел не JSON
  if [message] =~ /^\{/ {
    json {
      source => "message"
    }
  }

  # Обогащаем метаданными
  mutate {
    add_field => {
      "application" => "broker-clients-service"
      "environment" => "%{ENV:ENVIRONMENT:-dev}"
      "service"     => "clients"
    }
    remove_field => ["password", "secret", "token"]  # маскируем чувствительные данные
  }

  # Приводим timestamp
  date {
    match => [ "@timestamp", "ISO8601" ]
    target => "@timestamp"
  }
}

output {
  elasticsearch {
    hosts => ["elasticsearch:9200"]
    index => "broker-logs-%{+YYYY.MM.dd}"
    user => ""
    password => ""
  }

  # Для отладки в консоли Logstash
  stdout {
    codec => rubydebug
  }
}