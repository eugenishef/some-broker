version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: broker-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-broker_dev}
      POSTGRES_USER: ${POSTGRES_USER:-broker}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-broker}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - broker-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-broker} -d ${POSTGRES_DB:-broker_dev}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - broker-network
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

#  zookeeper:
#    image: confluentinc/cp-zookeeper:7.6.1
#    container_name: broker-zookeeper
#    environment:
#      ZOOKEEPER_CLIENT_PORT: 2181
#    networks:
#      - broker-network

  kafka:
    image: apache/kafka:3.7.0
    container_name: broker-kafka
    restart: unless-stopped
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
    volumes:
      - kafka-data:/var/lib/kafka/data
    networks:
      - broker-network
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

#  keycloak:
#    image: quay.io/keycloak/keycloak:25.0
#    container_name: broker-keycloak
#    command: start-dev
#    environment:
#      KEYCLOAK_ADMIN: admin
#      KEYCLOAK_ADMIN_PASSWORD: admin
#    ports:
#      - "8180:8080"
#    networks:
#      - broker-network

#  zipkin:
#    image: openzipkin/zipkin:latest
#    container_name: broker-zipkin
#    ports:
#      - "9411:9411"
#    networks:
#      - broker-network

  elasticsearch:
    image: elasticsearch:8.15.0
    container_name: broker-elasticsearch
    restart: unless-stopped
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    ports:
      - "9200:9200"
    volumes:
      - es-data:/usr/share/elasticsearch/data
    networks:
      - broker-network
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  logstash:
    image: logstash:8.15.0
    container_name: broker-logstash
    restart: unless-stopped
    depends_on:
      - elasticsearch
    ports:
      - "5044:5044"   # Filebeat / Beats
      - "5001:5001"   # TCP JSON от Spring Boot (Logback)
    volumes:
      - ./logstash/pipeline/:/usr/share/logstash/pipeline/
    environment:
      - LS_JAVA_OPTS=-Xms256m -Xmx256m
    networks:
      - broker-network
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  kibana:
    image: kibana:8.15.0
    container_name: broker-kibana
    restart: unless-stopped
    depends_on:
      - elasticsearch
    ports:
      - "5601:5601"
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
    networks:
      - broker-network
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  prometheus:
    image: prom/prometheus:latest
    container_name: broker-prometheus
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"
    networks:
      - broker-network

  grafana:
    image: grafana/grafana:latest
    container_name: broker-grafana
    depends_on:
      - prometheus
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
    ports:
      - "3000:3000"
    networks:
      - broker-network

networks:
  broker-network:
    name: broker-network
    driver: bridge

volumes:
  broker-postgres-data:
  es-data:
  kafka-data: