spring:
  application:
    name: broker-clients-service

  datasource:
    url: jdbc:postgresql://localhost:5432/broker
    username: broker
    password: broker
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

  liquibase:
    enabled: true
    change-log: classpath:db/changelog/db.changelog-master.xml

server:
  port: 8080

logging:
  level:
    org.springframework.security: INFO
    liquibase: INFO