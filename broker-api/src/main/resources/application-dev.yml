spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${POSTGRES_DB:broker_dev}
    username: ${DB_USERNAME:broker}
    password: ${DB_PASSWORD:broker}

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true

logging:
  level:
    root: INFO
    com.example: DEBUG